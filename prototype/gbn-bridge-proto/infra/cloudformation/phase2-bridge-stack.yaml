AWSTemplateFormatVersion: "2010-09-09"
Description: Veritas Conduit Phase 10 V2 bridge-mode prototype stack.

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    AllowedPattern: "^[a-z0-9-]+$"
    Description: Short environment suffix used in V2-only resource names.
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the V2 prototype ECS services will run.
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnets for Fargate tasks with public IP assignment.
  PublisherImageUri:
    Type: String
    Description: ECR image URI for the V2 bridge publisher image.
  BridgeImageUri:
    Type: String
    Description: ECR image URI for the V2 ExitBridge image.
  DesiredBridgeCount:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 25
    Description: Desired number of V2 ExitBridge tasks.
  PublisherHttpPort:
    Type: Number
    Default: 8080
    MinValue: 1
    MaxValue: 65535
    Description: Publisher authority HTTP/control port reserved for the prototype service.
  UdpPunchPort:
    Type: Number
    Default: 443
    MinValue: 1
    MaxValue: 65535
    Description: Default UDP punch port advertised to bridges and creators.
  BatchWindowMs:
    Type: Number
    Default: 500
    MinValue: 1
    MaxValue: 60000
    Description: Publisher batch window for first-contact creator onboarding.
  PublisherEndpoint:
    Type: String
    Default: http://publisher.veritas.local:8080
    Description: Prototype publisher URL injected into ExitBridge and creator-facing containers.

Resources:
  BridgeCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "gbn-bridge-phase2-${EnvironmentName}"
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  BridgeTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "gbn-bridge-phase2-${EnvironmentName}-execution"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  PublisherLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/gbn/bridge-proto/${EnvironmentName}/publisher"
      RetentionInDays: 14

  BridgeLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/gbn/bridge-proto/${EnvironmentName}/exit-bridge"
      RetentionInDays: 14

  PublisherSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: V2 bridge publisher prototype ingress
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref PublisherHttpPort
          ToPort: !Ref PublisherHttpPort
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "gbn-bridge-phase2-${EnvironmentName}-publisher"

  BridgeSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: V2 ExitBridge UDP punch prototype ingress
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: udp
          FromPort: !Ref UdpPunchPort
          ToPort: !Ref UdpPunchPort
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "gbn-bridge-phase2-${EnvironmentName}-exit-bridge"

  PublisherTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "gbn-bridge-proto-publisher-${EnvironmentName}"
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt BridgeTaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: bridge-publisher
          Image: !Ref PublisherImageUri
          Essential: true
          PortMappings:
            - ContainerPort: !Ref PublisherHttpPort
              Protocol: tcp
          Environment:
            - Name: GBN_BRIDGE_ROLE
              Value: publisher
            - Name: GBN_BRIDGE_NODE_ID
              Value: publisher-authority
            - Name: GBN_BRIDGE_STACK_NAME
              Value: !Ref AWS::StackName
            - Name: GBN_BRIDGE_PUBLISHER_BIND_ADDR
              Value: !Sub "0.0.0.0:${PublisherHttpPort}"
            - Name: GBN_BRIDGE_PUBLISHER_URL
              Value: !Ref PublisherEndpoint
            - Name: GBN_BRIDGE_PUNCH_PORT
              Value: !Ref UdpPunchPort
            - Name: GBN_BRIDGE_BATCH_WINDOW_MS
              Value: !Ref BatchWindowMs
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref PublisherLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: publisher

  BridgeTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "gbn-bridge-proto-exit-bridge-${EnvironmentName}"
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt BridgeTaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: exit-bridge
          Image: !Ref BridgeImageUri
          Essential: true
          PortMappings:
            - ContainerPort: !Ref UdpPunchPort
              Protocol: udp
          Environment:
            - Name: GBN_BRIDGE_ROLE
              Value: exit-bridge
            - Name: GBN_BRIDGE_NODE_ID
              Value: !Sub "exit-bridge-${EnvironmentName}"
            - Name: GBN_BRIDGE_STACK_NAME
              Value: !Ref AWS::StackName
            - Name: GBN_BRIDGE_PUBLISHER_URL
              Value: !Ref PublisherEndpoint
            - Name: GBN_BRIDGE_PUNCH_PORT
              Value: !Ref UdpPunchPort
            - Name: GBN_BRIDGE_BATCH_WINDOW_MS
              Value: !Ref BatchWindowMs
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref BridgeLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: exit-bridge

  PublisherService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "gbn-bridge-proto-publisher-${EnvironmentName}"
      Cluster: !Ref BridgeCluster
      DesiredCount: 1
      LaunchType: FARGATE
      EnableExecuteCommand: true
      TaskDefinition: !Ref PublisherTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref PublisherSecurityGroup
          Subnets: !Ref PublicSubnetIds

  BridgeService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "gbn-bridge-proto-exit-bridge-${EnvironmentName}"
      Cluster: !Ref BridgeCluster
      DesiredCount: !Ref DesiredBridgeCount
      LaunchType: FARGATE
      EnableExecuteCommand: true
      TaskDefinition: !Ref BridgeTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref BridgeSecurityGroup
          Subnets: !Ref PublicSubnetIds

Outputs:
  ClusterName:
    Value: !Ref BridgeCluster
  PublisherServiceName:
    Value: !Sub "gbn-bridge-proto-publisher-${EnvironmentName}"
  BridgeServiceName:
    Value: !Sub "gbn-bridge-proto-exit-bridge-${EnvironmentName}"
  PublisherLogGroup:
    Value: !Ref PublisherLogGroup
  BridgeLogGroup:
    Value: !Ref BridgeLogGroup
  UdpPunchPort:
    Value: !Ref UdpPunchPort
  BatchWindowMs:
    Value: !Ref BatchWindowMs
